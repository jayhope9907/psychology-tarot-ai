<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a2e28" />
  <meta name="description" content="3D 타로 카드 — 심리와 함께하는 마음쉼터 타로 리딩" />
  <title>마음쉼터 · 3D 타로</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #0f1714;
      --glass: rgba(255, 253, 248, 0.08);
      --glass-border: rgba(255, 255, 255, 0.12);
      --text: #f4f1eb;
      --text-soft: #b8c4be;
      --accent: #3d6b5a;
      --accent-light: #5a8f78;
      --gold: #c4a574;
      --gold-soft: rgba(196, 165, 116, 0.2);
      --radius: 20px;
      --font-display: "Cormorant Garamond", serif;
      --font-body: "Noto Sans KR", sans-serif;
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100vh; min-height: 100dvh; }
    body {
      font-family: var(--font-body);
      color: var(--text);
      background: var(--bg-deep);
      overflow-x: hidden;
    }
    .ambient {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 50% at 20% 0%, rgba(90,143,120,0.2), transparent 55%),
        radial-gradient(ellipse 50% 40% at 90% 100%, rgba(196,165,116,0.15), transparent 50%),
        linear-gradient(165deg, #0f1714, #1a2822 50%, #141f1b);
    }
    .shell {
      position: relative; z-index: 1;
      max-width: 1200px; margin: 0 auto;
      padding: 16px; min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column; gap: 16px;
    }
    .topbar {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      padding: 14px 18px; border-radius: var(--radius);
      background: var(--glass); border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
    }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: linear-gradient(145deg, var(--accent-light), var(--accent));
      display: grid; place-items: center; font-size: 18px;
    }
    .brand h1 {
      margin: 0; font-family: var(--font-display); font-size: 1.5rem; font-weight: 600;
    }
    .brand p { margin: 2px 0 0; font-size: 0.8rem; color: var(--text-soft); }
    .nav-link {
      color: var(--text); text-decoration: none; font-size: 0.85rem;
      padding: 8px 14px; border-radius: 999px;
      border: 1px solid var(--glass-border); transition: 0.2s var(--ease);
    }
    .nav-link:hover { background: var(--gold-soft); border-color: var(--gold); }
    .layout {
      flex: 1; display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 16px; min-height: 0;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
    .stage-panel, .control-panel {
      border-radius: calc(var(--radius) + 4px);
      background: var(--glass); border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px); overflow: hidden;
    }
    .stage-panel { min-height: 420px; display: flex; flex-direction: column; }
  #tarotCanvas { flex: 1; min-height: 380px; position: relative; }
  #tarotCanvas canvas { display: block; width: 100% !important; height: 100% !important; }
    .stage-footer {
      padding: 12px 16px; border-top: 1px solid var(--glass-border);
      display: flex; align-items: center; justify-content: space-between; gap: 8px;
      font-size: 0.82rem; color: var(--text-soft);
    }
    .phase-pill {
      padding: 4px 10px; border-radius: 999px;
      background: var(--gold-soft); color: var(--gold); font-weight: 600;
    }
    .control-panel { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
    .step-title {
      font-family: var(--font-display); font-size: 1.6rem; margin: 0;
    }
    .step-desc { margin: 0; color: var(--text-soft); font-size: 0.9rem; line-height: 1.6; }
    label { font-size: 0.82rem; color: var(--text-soft); font-weight: 500; }
    textarea {
      width: 100%; min-height: 88px; resize: vertical;
      border-radius: 14px; border: 1px solid var(--glass-border);
      background: rgba(0,0,0,0.25); color: var(--text);
      padding: 12px 14px; font-family: inherit; font-size: 0.92rem;
    }
    textarea:focus { outline: 2px solid rgba(90,143,120,0.45); }
    .spread-options { display: flex; gap: 8px; flex-wrap: wrap; }
    .spread-btn {
      flex: 1; min-width: 100px; padding: 10px 12px;
      border-radius: 12px; border: 1px solid var(--glass-border);
      background: transparent; color: var(--text); cursor: pointer;
      font-family: inherit; font-size: 0.85rem; transition: 0.2s;
    }
    .spread-btn.active {
      background: rgba(61,107,90,0.35); border-color: var(--accent-light);
    }
    .actions { display: flex; flex-wrap: wrap; gap: 8px; }
    .btn {
      border: none; border-radius: 12px; padding: 12px 18px;
      font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: 0.2s var(--ease);
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent-light), var(--accent));
      color: #fff; flex: 1;
    }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.08); transform: translateY(-1px); }
    .btn-ghost {
      background: transparent; color: var(--text);
      border: 1px solid var(--glass-border);
    }
    .reading-panel {
      margin-top: 4px; display: none; flex-direction: column; gap: 12px;
      max-height: 42vh; overflow-y: auto;
    }
    .reading-panel.visible { display: flex; }
    .reading-summary {
      padding: 14px; border-radius: 14px;
      background: rgba(61,107,90,0.18); border: 1px solid rgba(90,143,120,0.25);
      font-size: 0.9rem; line-height: 1.7;
    }
    .card-reading {
      padding: 14px; border-radius: 14px;
      background: rgba(0,0,0,0.22); border: 1px solid var(--glass-border);
    }
    .card-reading h3 {
      margin: 0 0 6px; font-size: 0.95rem; color: var(--gold);
    }
    .card-reading p { margin: 0; font-size: 0.86rem; line-height: 1.65; color: var(--text-soft); }
    .card-reading .theme {
      margin-top: 8px; font-size: 0.78rem; color: var(--accent-light);
    }
    .ai-block {
      padding: 14px; border-radius: 14px;
      background: rgba(196,165,116,0.1); border: 1px solid rgba(196,165,116,0.25);
      white-space: pre-wrap; font-size: 0.86rem; line-height: 1.75;
    }
    .actions-list { margin: 0; padding-left: 18px; font-size: 0.85rem; color: var(--text-soft); }
    .actions-list li { margin-bottom: 6px; }
    .loading {
      display: none; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--gold);
    }
    .loading.visible { display: flex; }
    .spinner {
      width: 16px; height: 16px; border: 2px solid rgba(196,165,116,0.3);
      border-top-color: var(--gold); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .mini-cards {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .mini-card {
      padding: 10px; border-radius: 12px; text-align: center;
      background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
      font-size: 0.78rem;
    }
    .mini-card .sym { font-size: 1.4rem; display: block; margin-bottom: 4px; }
    .mini-card.reversed { opacity: 0.85; border-color: rgba(229,56,59,0.35); }
    .status-line {
      font-size: 0.84rem; color: var(--gold); min-height: 1.2em;
      padding: 6px 0;
    }
    .fallback-cards {
      display: none; grid-template-columns: repeat(3, 1fr); gap: 8px;
      margin-top: 8px;
    }
    .fallback-cards.visible { display: grid; }
    .blend-banner {
      margin-top: 8px; padding: 12px; border-radius: 14px;
      background: rgba(61,107,90,0.2); border: 1px solid rgba(90,143,120,0.3);
      font-size: 0.84rem; line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="ambient"></div>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-icon">✦</div>
        <div>
          <h1>3D 타로 리딩</h1>
          <p>심리 상담과 융합한 마음쉼터 타로</p>
        </div>
      </div>
      <a class="nav-link" href="/">← 상담 채팅으로</a>
    </header>

    <div class="layout">
      <section class="stage-panel">
        <div id="tarotCanvas"></div>
        <div class="stage-footer">
          <span class="phase-pill" id="phaseLabel">준비</span>
          <span id="stageHint">카드를 섞고 뽑아 보세요</span>
        </div>
      </section>

      <section class="control-panel">
        <div id="setupStep">
          <h2 class="step-title">마음의 질문을 적어 주세요</h2>
          <p class="step-desc">지금 가장 궁금한 상황이나 감정을 적으면, 카드와 심리 풀이가 더 깊어집니다.</p>
          <label for="userStory">질문 · 상황</label>
          <textarea id="userStory" placeholder="예: 요즘 직장에서 힘들고 앞이 막막해요. 어떤 마음을 돌봐야 할까요?"></textarea>
          <label>스프레드</label>
          <div class="spread-options">
            <button type="button" class="spread-btn" data-spread="single" data-count="1">원카드</button>
            <button type="button" class="spread-btn active" data-spread="three_card" data-count="3">3카드</button>
          </div>
          <div class="actions">
            <button type="button" class="btn btn-primary" id="btnStart" disabled>카드 섞고 뽑기</button>
          </div>
          <p class="status-line" id="statusLine"></p>
          <div class="fallback-cards" id="fallbackCards"></div>
        </div>

        <div id="revealStep" style="display:none">
          <h2 class="step-title">카드가 펼쳐졌어요</h2>
          <p class="step-desc" id="revealDesc">카드를 뒤집는 중이에요. 잠시만 기다려 주세요…</p>
          <div class="mini-cards" id="miniCards"></div>
          <div class="actions">
            <button type="button" class="btn btn-ghost" id="btnFlip">카드 다시 뒤집기</button>
            <button type="button" class="btn btn-primary" id="btnReading">심리 풀이 받기</button>
          </div>
          <div class="loading" id="loadingReading"><span class="spinner"></span> 이서연 상담사가 풀이를 준비하고 있어요…</div>
          <div class="blend-banner" id="blendBanner" style="display:none">
            타로 풀이가 상담과 연결됩니다. 풀이 후 <strong>상담에서 이어 풀기</strong>를 누르면 이서연 상담사가 카드와 함께 대화를 이어갑니다.
          </div>
        </div>

        <div class="reading-panel" id="readingPanel">
          <div class="reading-summary" id="readingSummary"></div>
          <div id="cardReadings"></div>
          <div class="ai-block" id="aiAnalysis"></div>
          <ul class="actions-list" id="actionList"></ul>
          <div class="actions">
            <button type="button" class="btn btn-ghost" id="btnReset">다시 뽑기</button>
            <button type="button" class="btn btn-primary" id="btnToChat">상담에서 이어 풀기</button>
          </div>
        </div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="/static/js/tarot-scene.js"></script>
  <script>
    const PHASE_LABELS = {
      idle: "준비",
      ready: "대기",
      shuffling: "섞는 중",
      spreading: "펼치는 중",
      reveal: "공개",
      complete: "완료",
    };
    const HINTS = {
      ready: "카드를 섞고 뽑아 보세요",
      shuffling: "카드가 에너지를 모으고 있어요…",
      spreading: "운명의 카드가 자리를 찾고 있어요…",
      reveal: "카드를 뒤집어 메시지를 확인하세요",
      complete: "풀이를 받아 보세요",
    };

    const TAROT_HANDOFF_KEY = "psychology_ai_tarot_handoff";
    const userId = localStorage.getItem("psychology_ai_user_id") || `user-${crypto.randomUUID().slice(0, 8)}`;
    localStorage.setItem("psychology_ai_user_id", userId);
    const urlSession = new URLSearchParams(window.location.search).get("session_id");
    const sessionId = urlSession || localStorage.getItem("psychology_ai_session_id") || null;

    let scene = null;
    let deckCatalog = [];
    let currentDraw = null;
    let currentReading = null;
    let selectedSpread = "three_card";
    let selectedCount = 3;
    let flipIndex = 0;
    let deckReady = false;
    let use3d = true;

    const els = {
      canvas: document.getElementById("tarotCanvas"),
      phaseLabel: document.getElementById("phaseLabel"),
      stageHint: document.getElementById("stageHint"),
      userStory: document.getElementById("userStory"),
      btnStart: document.getElementById("btnStart"),
      btnFlip: document.getElementById("btnFlip"),
      btnReading: document.getElementById("btnReading"),
      btnReset: document.getElementById("btnReset"),
      btnToChat: document.getElementById("btnToChat"),
      setupStep: document.getElementById("setupStep"),
      revealStep: document.getElementById("revealStep"),
      revealDesc: document.getElementById("revealDesc"),
      miniCards: document.getElementById("miniCards"),
      fallbackCards: document.getElementById("fallbackCards"),
      statusLine: document.getElementById("statusLine"),
      loadingReading: document.getElementById("loadingReading"),
      readingPanel: document.getElementById("readingPanel"),
      readingSummary: document.getElementById("readingSummary"),
      cardReadings: document.getElementById("cardReadings"),
      aiAnalysis: document.getElementById("aiAnalysis"),
      actionList: document.getElementById("actionList"),
      blendBanner: document.getElementById("blendBanner"),
    };

    function setStatus(text) {
      els.statusLine.textContent = text || "";
    }

    document.querySelectorAll(".spread-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".spread-btn").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        selectedSpread = btn.dataset.spread;
        selectedCount = Number(btn.dataset.count);
      });
    });

    function renderFallbackCards(cards) {
      els.fallbackCards.innerHTML = cards.map((c) => `
        <div class="mini-card ${c.reversed ? "reversed" : ""}">
          <span class="sym">${c.symbol}</span>
          <strong>${c.name_ko}</strong>
        </div>
      `).join("");
      els.fallbackCards.classList.add("visible");
    }

    async function loadDeck() {
      try {
        const res = await fetch("/api/v1/tarot/deck");
        if (!res.ok) throw new Error("deck fetch failed");
        const data = await res.json();
        deckCatalog = data.cards || [];
        if (typeof THREE !== "undefined" && typeof TarotScene !== "undefined") {
          scene = new TarotScene(els.canvas);
          scene.onPhaseChange = (phase) => {
            els.phaseLabel.textContent = PHASE_LABELS[phase] || phase;
            els.stageHint.textContent = HINTS[phase] || "";
          };
          scene.buildDeck(deckCatalog);
        } else {
          use3d = false;
          els.stageHint.textContent = "3D 미리보기 대신 카드 풀이 모드로 진행합니다";
        }
        deckReady = true;
        els.btnStart.disabled = false;
        setStatus("준비 완료. 질문을 적고 카드를 뽑아 보세요.");
      } catch (err) {
        setStatus("덱을 불러오지 못했어요. 새로고침 후 다시 시도해 주세요.");
      }
    }

    function renderMiniCards(cards) {
      els.miniCards.innerHTML = cards.map((c) => `
        <div class="mini-card ${c.reversed ? "reversed" : ""}">
          <span class="sym">${c.symbol}</span>
          <strong>${c.name_ko}</strong><br/>
          <span>${c.position}</span>
        </div>
      `).join("");
      renderFallbackCards(cards);
    }

    function renderReading(reading) {
      currentReading = reading;
      els.readingSummary.textContent = reading.summary || "";
      els.cardReadings.innerHTML = (reading.cards || []).map((c) => `
        <div class="card-reading">
          <h3>${c.position} · ${c.title}</h3>
          <p>${c.meaning}</p>
          <div class="theme">심리 테마: ${c.psychology_theme}</div>
        </div>
      `).join("");
      els.aiAnalysis.textContent = reading.ai_analysis || "";
      els.actionList.innerHTML = (reading.recommended_actions || reading.cbt_actions || [])
        .map((a) => `<li>${typeof a === "string" ? a : a.text || a}</li>`).join("");
      els.readingPanel.classList.add("visible");
      els.blendBanner.style.display = "block";
      els.btnToChat.disabled = false;
    }

    async function autoFlipAll() {
      if (!use3d || !scene) return;
      for (let i = 0; i < (currentDraw?.cards?.length || 0); i++) {
        await scene.flipCard(i);
        flipIndex = i + 1;
        await new Promise((r) => setTimeout(r, 380));
      }
      scene.phase = "complete";
      if (scene.onPhaseChange) scene.onPhaseChange("complete");
    }

    els.btnStart.addEventListener("click", async () => {
      if (!deckReady) return;
      els.btnStart.disabled = true;
      flipIndex = 0;
      els.readingPanel.classList.remove("visible");
      els.blendBanner.style.display = "none";
      els.btnToChat.disabled = true;
      els.revealStep.style.display = "none";

      try {
        setStatus("카드를 섞는 중이에요…");
        if (use3d && scene) await scene.shuffle();

        setStatus("운명의 카드를 뽑는 중이에요…");
        const drawRes = await fetch("/api/v1/tarot/draw", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ spread: selectedSpread, count: selectedCount }),
        });
        if (!drawRes.ok) throw new Error("draw failed");
        currentDraw = await drawRes.json();
        if (!currentDraw.cards?.length) throw new Error("empty draw");

        setStatus("카드를 펼치는 중이에요…");
        if (use3d && scene) {
          await scene.spread(currentDraw.cards);
        }

        renderMiniCards(currentDraw.cards);
        els.setupStep.style.display = "none";
        els.revealStep.style.display = "block";
        els.revealDesc.textContent = "카드를 뒤집고 있습니다…";
        els.btnReading.disabled = true;

        await autoFlipAll();
        els.revealDesc.textContent = "카드가 공개됐어요. 심리 풀이를 받아 보세요.";
        els.btnReading.disabled = false;
        setStatus("");
      } catch (err) {
        console.error(err);
        setStatus("카드 진행 중 문제가 생겼어요. 다시 시도해 주세요.");
        els.setupStep.style.display = "block";
        els.revealStep.style.display = "none";
      } finally {
        els.btnStart.disabled = false;
      }
    });

    els.btnFlip.addEventListener("click", async () => {
      if (!currentDraw || !use3d || !scene || !scene.meshes?.length) return;
      flipIndex = 0;
      scene.meshes.forEach((mesh) => {
        mesh.userData.flipped = false;
        mesh.rotation.y = 0;
      });
      await autoFlipAll();
    });

    els.btnReading.addEventListener("click", async () => {
      els.btnReading.disabled = true;
      els.loadingReading.classList.add("visible");
      setStatus("이서연 상담사가 카드와 마음을 연결하고 있어요…");
      try {
        const res = await fetch("/api/v1/tarot/reading", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            user_id: userId,
            session_id: sessionId,
            user_story: els.userStory.value.trim(),
            spread: selectedSpread,
            count: selectedCount,
            cards: currentDraw.cards,
            bridge_to_chat: false,
          }),
        });
        if (!res.ok) throw new Error("reading failed");
        const data = await res.json();
        renderReading(data.reading || {});
        setStatus("풀이가 준비됐어요. 상담과 이어가실 수 있어요.");
      } catch (err) {
        alert("풀이를 가져오지 못했어요.");
        setStatus("");
      } finally {
        els.loadingReading.classList.remove("visible");
        els.btnReading.disabled = false;
      }
    });

    els.btnToChat.addEventListener("click", async () => {
      if (!currentDraw || !currentReading) {
        alert("먼저 심리 풀이를 받아 주세요.");
        return;
      }
      els.btnToChat.disabled = true;
      try {
        const res = await fetch("/api/v1/tarot/bridge", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            user_id: userId,
            session_id: sessionId,
            user_story: els.userStory.value.trim(),
            draw: currentDraw,
            reading: currentReading,
          }),
        });
        if (!res.ok) throw new Error("bridge failed");
        const data = await res.json();
        localStorage.setItem("psychology_ai_session_id", data.session_id);
        localStorage.setItem(TAROT_HANDOFF_KEY, JSON.stringify({
          session_id: data.session_id,
          bridge_message: data.bridge_message,
          draw: currentDraw,
          reading: currentReading,
        }));
        window.location.href = "/?from_tarot=1";
      } catch (err) {
        alert("상담 연결에 실패했어요. 다시 시도해 주세요.");
        els.btnToChat.disabled = false;
      }
    });

    els.btnReset.addEventListener("click", () => {
      currentDraw = null;
      currentReading = null;
      flipIndex = 0;
      els.setupStep.style.display = "block";
      els.revealStep.style.display = "none";
      els.readingPanel.classList.remove("visible");
      els.fallbackCards.classList.remove("visible");
      els.blendBanner.style.display = "none";
      els.btnReading.disabled = true;
      els.btnToChat.disabled = true;
      setStatus("다시 질문을 적고 카드를 뽑아 보세요.");
      if (use3d && scene) scene.buildDeck(deckCatalog);
    });

    loadDeck();
  </script>
</body>
</html>
