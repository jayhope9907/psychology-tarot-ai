<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3182F6" />
  <meta name="description" content="매일 30초 마음 체크인 — 마음쉼터" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icons/icon.svg" />
  <title>마음쉼터 · 홈</title>
  <link rel="stylesheet" href="/static/css/toss-ui.css" />
  <link rel="stylesheet" href="/static/css/embed.css" />
  <script>if(new URLSearchParams(location.search).get("embed")==="1")document.documentElement.classList.add("embed-mode");</script>
  <style>
    body.toss-ui.home-page { min-height: 100vh; padding: 16px 16px 100px; max-width: 720px; margin: 0 auto; }
    .home-greeting { margin: 8px 0 20px; }
    .home-greeting h1 { margin: 0; font-size: 1.6rem; font-weight: 800; letter-spacing: -0.04em; }
    .home-greeting p { margin: 6px 0 0; color: var(--t-text-secondary); font-size: 0.9rem; line-height: 1.5; }
    .streak-pill {
      display: inline-flex; align-items: center; gap: 6px; margin-top: 10px;
      padding: 6px 12px; border-radius: 999px; background: var(--t-blue-soft);
      color: var(--t-blue-dark); font-size: 0.78rem; font-weight: 700;
    }
    .checkin-card {
      background: var(--t-surface); border: 1px solid var(--t-border);
      border-radius: var(--t-radius-lg); padding: 18px; margin-bottom: 12px;
      box-shadow: var(--t-shadow);
    }
    .checkin-card h2 { margin: 0 0 4px; font-size: 1rem; font-weight: 800; }
    .checkin-card .desc { margin: 0 0 14px; font-size: 0.8rem; color: var(--t-text-secondary); }
    .mood-row { display: flex; gap: 8px; justify-content: space-between; margin-bottom: 14px; }
    .mood-btn {
      flex: 1; border: 1px solid var(--t-border); background: var(--t-bg);
      border-radius: 14px; padding: 12px 4px; cursor: pointer; font: inherit;
      font-size: 1.4rem; transition: 0.15s;
    }
    .mood-btn.selected { border-color: var(--t-blue); background: var(--t-blue-soft); transform: scale(1.05); }
    .mood-labels { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--t-text-tertiary); margin-top: 6px; }
    .mood-sphere-stage {
      perspective: 680px; height: 148px; display: grid; place-items: center;
      margin: 4px 0 16px; position: relative;
    }
    .mood-sphere {
      width: 96px; height: 96px; position: relative; transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(.2,.8,.2,1), filter 0.45s;
    }
    .sphere-core {
      position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle at 32% 28%, rgba(255,255,255,0.85), rgba(49,130,246,0.55) 42%, rgba(26,86,180,0.85));
      box-shadow: inset -8px -12px 24px rgba(0,0,0,0.18), 0 16px 36px rgba(49,130,246,0.28);
    }
    .sphere-glow {
      position: absolute; inset: -18px; border-radius: 50%;
      background: radial-gradient(circle, rgba(49,130,246,0.35), transparent 68%);
      filter: blur(8px); pointer-events: none;
    }
    .sphere-orbit {
      position: absolute; inset: -10px; border-radius: 50%;
      border: 1px dashed rgba(49,130,246,0.25); transform: rotateX(72deg);
    }
    .agent-pill {
      display: inline-flex; align-items: center; gap: 6px; margin-bottom: 10px;
      padding: 6px 12px; border-radius: 999px; background: rgba(49,130,246,0.1);
      color: var(--t-blue-dark); font-size: 0.74rem; font-weight: 700;
    }
    .dim-grid { display: grid; gap: 10px; }
    .dim-row { display: grid; grid-template-columns: 72px 1fr 36px; gap: 8px; align-items: center; }
    .dim-row label { font-size: 0.72rem; font-weight: 700; color: var(--t-text-secondary); }
    .dim-row input[type=range] { width: 100%; accent-color: var(--t-blue); }
    .dim-row .dim-val { text-align: right; font-size: 0.78rem; font-weight: 800; color: var(--t-blue); }
    .dim-hint { font-size: 0.65rem; color: var(--t-text-tertiary); margin-top: -4px; grid-column: 2 / -1; }
    .note-input {
      width: 100%; margin-top: 12px; border: 1px solid var(--t-border); border-radius: 12px;
      padding: 10px 12px; font: inherit; font-size: 0.85rem; resize: none; min-height: 56px;
    }
    .submit-checkin {
      width: 100%; margin-top: 10px; padding: 14px; border: none; border-radius: 12px;
      background: var(--t-blue); color: white; font: inherit; font-weight: 700; cursor: pointer;
    }
    .submit-checkin:disabled { opacity: 0.5; }
    .quick-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 12px; }
    .quick-card {
      display: block; padding: 16px; border-radius: var(--t-radius-lg);
      background: var(--t-surface); border: 1px solid var(--t-border);
      text-decoration: none; color: var(--t-text); box-shadow: var(--t-shadow);
    }
    .quick-card strong { display: block; font-size: 0.95rem; margin-bottom: 4px; }
    .quick-card span { font-size: 0.78rem; color: var(--t-text-secondary); }
    .chart-row { display: flex; gap: 6px; align-items: flex-end; height: 64px; margin-top: 10px; }
    .chart-bar {
      flex: 1; background: var(--t-blue-soft); border-radius: 6px 6px 0 0;
      min-height: 8px; position: relative;
    }
    .chart-bar span {
      position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
      font-size: 0.6rem; color: var(--t-text-tertiary); white-space: nowrap;
    }
    .report-list { margin: 10px 0 0; padding-left: 18px; font-size: 0.82rem; color: var(--t-text-secondary); line-height: 1.6; }
    .reminder-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 10px; font-size: 0.85rem; }
  </style>
</head>
<body class="toss-ui home-page">
  <header class="home-greeting">
    <h1 id="greetingTitle">안녕하세요</h1>
    <p id="greetingSub">오늘 마음은 어떤가요?</p>
    <span class="streak-pill" id="streakPill" hidden>🔥 연속 0일</span>
  </header>

  <section class="checkin-card" id="checkinCard">
    <h2>입체 마음 체크인</h2>
    <p class="desc">기분·에너지·불안·관계·수면 — 5축으로 오늘 마음을 표현해 주세요.</p>
    <span class="agent-pill" id="agentPill" hidden>맞춤 AI · 준비 중</span>

    <div class="mood-sphere-stage" aria-hidden="true">
      <div class="mood-sphere" id="moodSphere">
        <div class="sphere-glow" id="sphereGlow"></div>
        <div class="sphere-orbit"></div>
        <div class="sphere-core" id="sphereCore"></div>
      </div>
    </div>

    <p class="desc" style="margin:-4px 0 10px;text-align:center" id="dimensionSummary">5축 슬라이더를 조절해 보세요</p>

    <div class="mood-row" id="moodRow">
      <button type="button" class="mood-btn" data-score="1" aria-label="매우 힘듦">😔</button>
      <button type="button" class="mood-btn" data-score="2" aria-label="힘듦">😕</button>
      <button type="button" class="mood-btn" data-score="3" aria-label="보통">😐</button>
      <button type="button" class="mood-btn" data-score="4" aria-label="괜찮음">🙂</button>
      <button type="button" class="mood-btn" data-score="5" aria-label="좋음">😊</button>
    </div>
    <div class="mood-labels"><span>기분 빠른 선택</span><span></span><span></span><span></span><span></span></div>

    <div class="dim-grid" id="dimGrid"></div>

    <textarea class="note-input" id="checkinNote" placeholder="한 줄 메모 (선택)"></textarea>
    <button type="button" class="submit-checkin" id="btnCheckin" disabled>체크인 저장</button>
    <p id="checkinStatus" style="margin:10px 0 0;font-size:0.8rem;color:var(--t-text-secondary)"></p>
  </section>

  <div class="quick-grid">
    <a class="quick-card" href="/chat"><strong>💬 상담</strong><span>이서연 상담사와 대화</span></a>
    <a class="quick-card" href="/tarot"><strong>✦ 타로</strong><span>직접 섞고 뽑기</span></a>
    <a class="quick-card" href="/test"><strong>🧪 테스트</strong><span>API·상태 확인</span></a>
    <a class="quick-card" href="/chat" id="continueChat"><strong>↩ 이어하기</strong><span id="continueHint">최근 상담 이어가기</span></a>
  </div>

  <section class="checkin-card">
    <h2>이번 주 기분</h2>
    <p class="desc">최근 7일 체크인</p>
    <div class="chart-row" id="moodChart"></div>
  </section>

  <section class="checkin-card" id="weeklyCard">
    <h2>주간 인사이트</h2>
    <p class="desc" id="weeklySummary">불러오는 중…</p>
    <ul class="report-list" id="weeklyInsights"></ul>
  </section>

  <section class="checkin-card">
    <h2>알림 설정</h2>
    <p class="desc">매일 저녁 9시, 체크인 리마인더 (PWA)</p>
    <div class="reminder-row">
      <span>저녁 리마인더</span>
      <input type="checkbox" id="reminderToggle" />
    </div>
  </section>

  <nav class="t-bottom-nav" aria-label="하단 메뉴">
    <a href="/" class="t-nav-item active"><span class="t-nav-icon">🏠</span>홈</a>
    <a href="/chat" class="t-nav-item"><span class="t-nav-icon">💬</span>상담</a>
    <a href="/tarot" class="t-nav-item"><span class="t-nav-icon">✦</span>타로</a>
  </nav>

  <script>
    const USER_KEY = "psychology_ai_user_id";
    const userId = localStorage.getItem(USER_KEY) || `user-${crypto.randomUUID().slice(0, 8)}`;
    localStorage.setItem(USER_KEY, userId);

    let selectedMood = null;
    let dimensionMeta = {};
    const dimensions = { valence: 3, energy: 3, anxiety: 3, social: 3, sleep: 3 };

    function renderDimensionSliders(meta) {
      dimensionMeta = meta || dimensionMeta;
      const grid = document.getElementById("dimGrid");
      grid.innerHTML = Object.entries(dimensionMeta).map(([key, m]) => `
        <div class="dim-row">
          <label for="dim-${key}">${m.emoji || ""} ${m.label}</label>
          <input type="range" id="dim-${key}" min="1" max="5" step="1" value="${dimensions[key] || 3}" data-key="${key}" />
          <span class="dim-val" id="dim-val-${key}">${dimensions[key] || 3}</span>
          <span class="dim-hint">${m.low} ↔ ${m.high}</span>
        </div>
      `).join("");
      grid.querySelectorAll("input[type=range]").forEach((input) => {
        input.addEventListener("input", () => {
          dimensions[input.dataset.key] = Number(input.value);
          document.getElementById(`dim-val-${input.dataset.key}`).textContent = input.value;
          updateSpherePreview();
          document.getElementById("btnCheckin").disabled = false;
        });
      });
    }

    function updateSpherePreview(sphere) {
      const s = sphere || {
        rotateX: (dimensions.energy - 3) * 12,
        rotateY: (dimensions.valence - 3) * 14,
        rotateZ: (dimensions.social - 3) * 8,
        scale: Math.max(0.72, 1.08 - (dimensions.anxiety - 1) * 0.07),
        glow: Math.min(1, 0.35 + dimensions.social * 0.12 + dimensions.valence * 0.05),
        hue: Math.max(0, Math.min(360, 210 - (dimensions.valence - 3) * 28 + (dimensions.anxiety - 3) * 12)),
        pulse: Math.max(0, (dimensions.anxiety - 2) * 0.18),
      };
      const el = document.getElementById("moodSphere");
      const glow = document.getElementById("sphereGlow");
      const core = document.getElementById("sphereCore");
      el.style.transform = `rotateX(${s.rotateX}deg) rotateY(${s.rotateY}deg) rotateZ(${s.rotateZ}deg) scale(${s.scale})`;
      glow.style.opacity = s.glow;
      core.style.background = `radial-gradient(circle at 32% 28%, rgba(255,255,255,0.88), hsl(${s.hue} 72% 62%) 42%, hsl(${s.hue} 68% 42%) 100%)`;
      el.style.animation = s.pulse > 0.05 ? `pulse ${1.6 - s.pulse}s ease-in-out infinite` : "";
    }

    function applyDimensionsFromCheckin(checkin) {
      if (!checkin?.dimensions) return;
      Object.assign(dimensions, checkin.dimensions);
      Object.keys(dimensions).forEach((key) => {
        const input = document.getElementById(`dim-${key}`);
        const val = document.getElementById(`dim-val-${key}`);
        if (input) input.value = dimensions[key];
        if (val) val.textContent = dimensions[key];
      });
      if (checkin.sphere) updateSpherePreview(checkin.sphere);
      else updateSpherePreview();
      if (checkin.agent?.label) {
        const pill = document.getElementById("agentPill");
        pill.hidden = false;
        pill.textContent = `맞춤 AI · ${checkin.agent.label}`;
      }
      if (checkin.dimension_summary) {
        document.getElementById("dimensionSummary").textContent = checkin.dimension_summary;
      }
    }

    async function loadDashboard() {
      const res = await fetch(`/api/v1/dashboard/${encodeURIComponent(userId)}`);
      const data = await res.json();
      renderDimensionSliders(data.dimension_meta || {
        valence: { label: "기분", low: "우울", high: "밝음", emoji: "🎭" },
        energy: { label: "에너지", low: "무기력", high: "활력", emoji: "⚡" },
        anxiety: { label: "불안", low: "차분", high: "긴장", emoji: "🌊" },
        social: { label: "관계", low: "고립", high: "연결", emoji: "🤝" },
        sleep: { label: "수면", low: "피로", high: "회복", emoji: "🌙" },
      });
      document.getElementById("greetingTitle").textContent = (data.greeting || "안녕하세요").replace(/\*\*/g, "");
      document.getElementById("greetingSub").textContent = data.today_checkin
        ? (data.today_checkin.dimension_summary || `오늘 기록: ${data.today_checkin.mood_label}`)
        : "5축으로 오늘 마음을 표현해 보세요";

      const streak = data.streak?.current_streak || 0;
      const pill = document.getElementById("streakPill");
      if (streak > 0) {
        pill.hidden = false;
        pill.textContent = `🔥 연속 ${streak}일`;
      }

      if (data.today_checkin) {
        selectedMood = data.today_checkin.mood_score;
        document.querySelectorAll(".mood-btn").forEach((b) => {
          b.classList.toggle("selected", Number(b.dataset.score) === selectedMood);
        });
        document.getElementById("checkinNote").value = data.today_checkin.note || "";
        document.getElementById("btnCheckin").disabled = false;
        document.getElementById("btnCheckin").textContent = "체크인 수정";
        applyDimensionsFromCheckin(data.today_checkin);
      } else {
        updateSpherePreview();
      }

      if (data.session_id) {
        document.getElementById("continueChat").href = `/chat?session_id=${data.session_id}`;
        document.getElementById("continueHint").textContent = data.counseling_phase
          ? `상담 단계: ${data.counseling_phase}` : "최근 상담 이어가기";
      }

      renderChart(data.recent_checkins || []);
      renderWeekly(data.weekly_report || {});
    }

    function renderChart(checkins) {
      const chart = document.getElementById("moodChart");
      if (!checkins.length) {
        chart.innerHTML = '<p style="font-size:0.8rem;color:var(--t-text-tertiary)">아직 기록이 없어요</p>';
        return;
      }
      const ordered = [...checkins].reverse();
      chart.innerHTML = ordered.map((c) => {
        const h = Math.max(12, c.mood_score * 12);
        const day = c.checkin_date.slice(5);
        return `<div class="chart-bar" style="height:${h}px" title="${c.mood_label}"><span>${day}</span></div>`;
      }).join("");
    }

    function renderWeekly(report) {
      document.getElementById("weeklySummary").textContent = report.summary || "기록을 쌓으면 주간 리포트가 생성됩니다.";
      document.getElementById("weeklyInsights").innerHTML = (report.insights || [])
        .map((i) => `<li>${i}</li>`).join("");
    }

    document.querySelectorAll(".mood-btn").forEach((btn) => {
      btn.addEventListener("click", () => {
        selectedMood = Number(btn.dataset.score);
        dimensions.valence = selectedMood;
        dimensions.energy = Math.max(1, Math.min(5, selectedMood + (selectedMood >= 3 ? 0 : -1)));
        dimensions.anxiety = Math.max(1, Math.min(5, 6 - selectedMood));
        document.querySelectorAll(".mood-btn").forEach((b) => b.classList.remove("selected"));
        btn.classList.add("selected");
        Object.keys(dimensions).forEach((key) => {
          const input = document.getElementById(`dim-${key}`);
          const val = document.getElementById(`dim-val-${key}`);
          if (input) input.value = dimensions[key];
          if (val) val.textContent = dimensions[key];
        });
        updateSpherePreview();
        document.getElementById("btnCheckin").disabled = false;
      });
    });

    document.getElementById("btnCheckin").addEventListener("click", async () => {
      const note = document.getElementById("checkinNote").value.trim();
      const res = await fetch("/api/v1/checkin", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId, dimensions, note }),
      });
      const data = await res.json();
      selectedMood = data.mood_score;
      document.getElementById("checkinStatus").textContent =
        `저장됐어요! ${data.agent?.label || data.mood_label} · 연속 ${data.streak_days}일`;
      if (data.agent?.label) {
        const pill = document.getElementById("agentPill");
        pill.hidden = false;
        pill.textContent = `맞춤 AI · ${data.agent.label}`;
      }
      await loadDashboard();
    });

    document.getElementById("reminderToggle").addEventListener("change", async (e) => {
      const enabled = e.target.checked;
      if (enabled && "Notification" in window) {
        await Notification.requestPermission();
      }
      await fetch("/api/v1/settings/reminder", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ user_id: userId, evening_reminder: enabled, hour: 21 }),
      });
      if (enabled && "serviceWorker" in navigator) {
        const reg = await navigator.serviceWorker.ready;
        reg.active?.postMessage({ type: "SCHEDULE_REMINDER", hour: 21 });
      }
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/static/sw.js").catch(() => {});
    }

    loadDashboard().catch(() => {
      document.getElementById("checkinStatus").textContent = "대시보드를 불러오지 못했어요.";
    });
  </script>
</body>
</html>
