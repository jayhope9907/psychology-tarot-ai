<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="표준·확장 심리검사 — 레이어드 디렉팅과 자기효능감 키우기" />
  <title>마음쉼터 · 심리검사 탐색</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #14161c; --panel: #1c2030; --ink: #eef1f7; --muted: rgba(238,241,247,0.62);
      --line: rgba(150,170,210,0.25); --accent: #8aa4d4; --warm: #d4a574; --good: #5a8f78;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; font-family: "IBM Plex Sans KR", sans-serif; color: var(--ink);
      background: radial-gradient(ellipse 60% 40% at 90% 0%, rgba(138,164,212,0.16), transparent 55%), var(--bg);
      min-height: 100vh; line-height: 1.55;
    }
    .wrap { max-width: 720px; margin: 0 auto; padding: 18px 14px 90px; }
    nav { display: flex; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 8px; }
    nav a { color: var(--muted); text-decoration: none; font-size: 0.82rem; margin-left: 12px; }
    .logo { color: var(--ink); font-weight: 700; margin-left: 0 !important; }
    h1 { font-family: "Fraunces", serif; font-size: clamp(1.4rem, 4vw, 1.9rem); margin: 0 0 8px; }
    .lead { color: var(--muted); font-size: 0.88rem; }
    .notice {
      padding: 10px 12px; border-radius: 12px; border: 1px solid var(--line);
      background: rgba(138,164,212,0.08); margin: 12px 0; font-size: 0.78rem; color: var(--muted);
    }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 12px; }
    .panel h2 { margin: 0 0 6px; font-size: 1rem; }
    .meta { font-size: 0.74rem; color: var(--warm); margin-bottom: 8px; }
    button, .pick {
      border: 1px solid var(--line); background: rgba(255,255,255,0.04); color: var(--ink);
      border-radius: 10px; padding: 10px 12px; font: inherit; cursor: pointer; text-align: left;
    }
    button.primary { background: linear-gradient(135deg, var(--good), #3d6b5a); border: none; color: #fff; font-weight: 600; }
    .grid { display: grid; gap: 8px; }
    .pick.selected { border-color: var(--accent); background: rgba(138,164,212,0.18); }
    .row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; align-items: center; }
    .chip { display: inline-block; padding: 4px 10px; border-radius: 999px; font-size: 0.72rem; background: rgba(90,143,120,0.18); color: #9fd0b8; margin-right: 6px; }
    .screen { display: none; } .screen.active { display: block; }
    .inst { cursor: pointer; } .inst:hover { border-color: var(--accent); }
    a.inline { color: var(--warm); }
    .domain-bar { display: flex; flex-wrap: wrap; gap: 6px; margin: 10px 0 14px; }
    .domain-chip {
      border: 1px solid var(--line); background: rgba(255,255,255,0.03); color: var(--muted);
      border-radius: 999px; padding: 6px 10px; font: inherit; font-size: 0.72rem; cursor: pointer;
    }
    .domain-chip.active { border-color: var(--accent); color: var(--ink); background: rgba(138,164,212,0.16); }
    .domain-head {
      margin: 18px 0 8px; font-size: 0.78rem; color: var(--warm); font-weight: 600;
      letter-spacing: 0.02em;
    }
    .rail {
      display: flex; gap: 4px; flex-wrap: wrap; margin: 10px 0 14px;
    }
    .rail-step {
      flex: 1; min-width: 64px; text-align: center; font-size: 0.65rem; color: var(--muted);
      padding: 6px 4px; border-radius: 8px; border: 1px solid transparent; background: rgba(255,255,255,0.03);
    }
    .rail-step.active { border-color: var(--accent); color: var(--ink); background: rgba(138,164,212,0.14); }
    .rail-step.done { color: #9fd0b8; border-color: rgba(90,143,120,0.35); }
    .coach {
      margin: 0 0 12px; padding: 10px 12px; border-left: 3px solid var(--warm);
      background: rgba(212,165,116,0.08); font-size: 0.82rem; color: var(--ink);
    }
    .progress-bar {
      height: 4px; background: rgba(255,255,255,0.06); border-radius: 99px; overflow: hidden; margin: 8px 0 12px;
    }
    .progress-bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), var(--good)); width: 0%; transition: width .25s ease; }
    .seed { border-style: dashed; }
    .seed.picked { border-color: var(--good); background: rgba(90,143,120,0.16); }
    details.debug { margin-top: 12px; color: var(--muted); font-size: 0.72rem; }
    #strengthNote {
      width: 100%; min-height: 64px; margin-top: 8px; border-radius: 10px; border: 1px solid var(--line);
      background: #0d0f14; color: var(--ink); padding: 10px; font: inherit;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <nav>
      <a class="logo" href="/">마음쉼터</a>
      <div>
        <a href="/clinical">마음 돌보기</a>
        <a href="/chat">AI 대화</a>
      </div>
    </nav>
    <div id="viewList" class="screen active">
      <h1>마음 탐색</h1>
      <p class="lead">전체를 다 할 필요 없어요. 오늘은 추천 길 하나만 골라도 충분합니다.</p>
      <div class="notice">진단이 아닙니다. 안내를 따라가면 되고, 끝나면 작은 힘(자기효능감)을 고를 수 있어요.</div>
      <div class="panel" id="guidedBox"><span class="chip">오늘 추천 준비 중</span></div>
      <div class="panel" id="agentBox"><span class="chip">기록 동기화</span></div>
      <div class="domain-bar" id="domainBar"></div>
      <details id="fullCatalog">
        <summary style="cursor:pointer;font-weight:600;margin-bottom:10px;color:var(--warm)">주제별 전체 목록 열기</summary>
        <div id="list"></div>
      </details>
    </div>
    <div id="viewRun" class="screen">
      <button type="button" id="btnBack">← 목록</button>
      <div class="rail" id="runRail"></div>
      <div class="coach" id="runCoach"></div>
      <div class="progress-bar"><span id="runPct"></span></div>
      <div class="panel" style="margin-top:4px">
        <div class="meta" id="runMeta"></div>
        <h2 id="runFraming"></h2>
        <p id="runPrompt" style="font-size:0.95rem;margin:10px 0"></p>
        <div class="grid" id="runOptions"></div>
        <div class="row">
          <button type="button" id="btnSkip">지금은 넘어갈게요</button>
          <button type="button" class="primary" id="btnNext" disabled>다음</button>
        </div>
      </div>
    </div>
    <div id="viewDone" class="screen">
      <div class="rail" id="doneRail"></div>
      <div class="panel">
        <h2 id="doneTitle">방금 살펴본 것 · 효능감</h2>
        <p class="lead" id="doneMsg"></p>
        <p class="coach" id="doneAffirm" style="margin-top:10px"></p>
        <p class="meta" id="doneStrength"></p>
        <textarea id="strengthNote" placeholder="떠오르는 작은 근거를 한 줄로 적어도 좋아요 (선택)"></textarea>
        <p class="meta" style="margin-top:12px">오늘 고를 씨앗 하나</p>
        <div class="grid" id="seedBox"></div>
        <div class="row">
          <button type="button" class="primary" id="btnSaveSeed" disabled>이 힘으로 저장</button>
          <button type="button" id="btnAgain">다른 탐색</button>
          <a class="inline" href="/chat">대화로 이어가기 →</a>
        </div>
        <p class="lead" id="seedSaved" style="display:none;color:#9fd0b8;margin-top:10px"></p>
        <details class="debug" hidden><summary>동기화 상세</summary><pre id="doneJson" style="white-space:pre-wrap"></pre></details>
      </div>
    </div>
  </div>
  <script>
    const USER_KEY = "psychology_ai_user_id";
    const SESSION_KEY = "psychology_ai_session_id";
    let userId = localStorage.getItem(USER_KEY) || `user-${crypto.randomUUID().slice(0,8)}`;
    localStorage.setItem(USER_KEY, userId);
    let sessionId = localStorage.getItem(SESSION_KEY);
    let catalog = [];
    let domainFilter = "all";
    let current = null, itemIdx = 0, selected = null;
    let lastEfficacy = null;
    let pickedSeed = null;

    function show(id) {
      document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
    }

    function esc(s) {
      return String(s || "").replace(/[&<>"']/g, (c) => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;" }[c]));
    }

    function renderRail(el, rail, activeOverride) {
      if (!el) return;
      const steps = rail || [
        { id: "arrival", label: "왜 보나요", state: "todo" },
        { id: "orient", label: "어떻게", state: "todo" },
        { id: "progress", label: "함께", state: "todo" },
        { id: "complete", label: "정리", state: "todo" },
        { id: "efficacy", label: "효능감", state: "todo" },
      ];
      el.innerHTML = steps.map((s) => {
        let state = s.state || "todo";
        if (activeOverride && s.id === activeOverride) state = "active";
        return `<div class="rail-step ${state}">${esc(s.label)}</div>`;
      }).join("");
    }

    async function ensureSession() {
      if (sessionId) return sessionId;
      const res = await fetch(`/api/v1/chat/sessions/new?user_id=${encodeURIComponent(userId)}&plan=PLUS`, {
        method: "POST",
      });
      const data = await res.json();
      sessionId = data.session_id;
      if (sessionId) localStorage.setItem(SESSION_KEY, sessionId);
      return sessionId;
    }

    async function loadAgent() {
      try {
        const res = await fetch(`/api/v1/users/${encodeURIComponent(userId)}/agent`);
        if (!res.ok) return;
        const data = await res.json();
        const mbti = data.agent_fingerprint?.psychometric_profile?.mbti?.type_code_hint;
        const hist = Object.keys(data.agent_fingerprint?.assessment_hist || {}).length;
        document.getElementById("agentBox").innerHTML =
          `<span class="chip">기록됨</span>` +
          `<span class="meta">지금까지 남긴 탐색 ${hist}개` + (mbti ? ` · 성향 힌트 ${mbti}` : "") + `</span>`;
      } catch (e) {}
    }

    function domainKeys() {
      const map = new Map();
      catalog.forEach((i) => {
        const key = i.domain_label || i.school || "기타";
        map.set(key, (map.get(key) || 0) + 1);
      });
      return [...map.entries()].sort((a, b) => a[0].localeCompare(b[0], "ko"));
    }

    function renderDomainBar() {
      const bar = document.getElementById("domainBar");
      const chips = [`<button type="button" class="domain-chip ${domainFilter === "all" ? "active" : ""}" data-d="all">전체 ${catalog.length}</button>`];
      domainKeys().forEach(([label, count]) => {
        chips.push(`<button type="button" class="domain-chip ${domainFilter === label ? "active" : ""}" data-d="${label.replace(/"/g, "")}">${label} ${count}</button>`);
      });
      bar.innerHTML = chips.join("");
      bar.querySelectorAll(".domain-chip").forEach((btn) => {
        btn.onclick = () => {
          domainFilter = btn.dataset.d;
          renderDomainBar();
          renderList();
        };
      });
    }

    function renderList() {
      const list = document.getElementById("list");
      if (!catalog.length) {
        list.innerHTML = "<p class='lead'>목록을 불러오지 못했어요.</p>";
        return;
      }
      const filtered = domainFilter === "all"
        ? catalog
        : catalog.filter((i) => (i.domain_label || i.school || "기타") === domainFilter);
      if (!filtered.length) {
        list.innerHTML = "<p class='lead'>이 주제에 해당하는 검사가 없어요.</p>";
        return;
      }
      let html = "";
      let lastDomain = null;
      filtered.forEach((i) => {
        const domain = i.domain_label || i.school || "기타";
        if (domainFilter === "all" && domain !== lastDomain) {
          html += `<div class="domain-head">마음 주제 · ${domain}</div>`;
          lastDomain = domain;
        }
        html += `
        <div class="panel inst" data-id="${i.instrument_id}">
          <div class="meta">${domain} · ${i.item_count || (i.items || []).length}문항</div>
          <h2>${esc(i.user_title || i.display_name)}</h2>
          <p class="lead">${esc(i.intro || i.focus || "")}</p>
        </div>`;
      });
      list.innerHTML = html;
      list.querySelectorAll(".inst").forEach((el) => el.addEventListener("click", () => start(el.dataset.id)));
    }

    function applyDirecting(directing, pctHint) {
      const d = directing || current?.directing || {};
      const layers = d.layers || {};
      const rail = (d.rail || []).map((s) => {
        if (s.id === "arrival") return { ...s, state: "done" };
        if (s.id === "orient" && itemIdx === 0) return { ...s, state: "active" };
        if (s.id === "orient" && itemIdx > 0) return { ...s, state: "done" };
        if (s.id === "progress" && itemIdx > 0) return { ...s, state: "active" };
        return s;
      });
      renderRail(document.getElementById("runRail"), rail);
      const coach = d.coach_line
        || layers.progress?.body
        || layers.orient?.body
        || current?.intro
        || "편한 만큼만 골라 주세요.";
      document.getElementById("runCoach").textContent = coach;
      const total = current.items.length || 1;
      const pct = pctHint != null ? pctHint : Math.round((100 * itemIdx) / total);
      document.getElementById("runPct").style.width = `${Math.min(100, pct)}%`;
    }

    function start(id) {
      current = catalog.find((c) => c.instrument_id === id);
      if (!current || !current.items?.length) return;
      itemIdx = 0;
      selected = null;
      pickedSeed = null;
      lastEfficacy = current.efficacy_preview || null;
      renderItem();
      applyDirecting(current.directing, 0);
      show("viewRun");
    }

    function renderItem() {
      const item = current.items[itemIdx];
      document.getElementById("runMeta").textContent =
        `${current.user_title || current.display_name} · ${itemIdx + 1}/${current.items.length}`;
      document.getElementById("runFraming").textContent = item.framing || "편하게 골라 주세요";
      document.getElementById("runPrompt").textContent = item.prompt;
      const box = document.getElementById("runOptions");
      box.innerHTML = (item.options || []).map((o) =>
        `<button type="button" class="pick" data-v="${o.value}">${esc(o.label)}</button>`
      ).join("");
      selected = null;
      document.getElementById("btnNext").disabled = true;
      box.querySelectorAll(".pick").forEach((b) => b.addEventListener("click", () => {
        box.querySelectorAll(".pick").forEach((x) => x.classList.remove("selected"));
        b.classList.add("selected");
        selected = Number(b.dataset.v);
        document.getElementById("btnNext").disabled = false;
      }));
      applyDirecting(current.directing, Math.round((100 * itemIdx) / current.items.length));
    }

    function showEfficacy(data) {
      const directing = data.directing || {};
      const efficacy = data.efficacy || directing.layers?.efficacy || lastEfficacy || {};
      lastEfficacy = efficacy;
      const completeBody = directing.layers?.complete?.body
        || "에이전트에 반영했어요. 이제 작은 힘으로 이어가 볼까요.";
      document.getElementById("doneMsg").textContent = completeBody;
      document.getElementById("doneAffirm").textContent = efficacy.affirmation || "작은 성공을 고르는 힘이 자기효능감이에요.";
      document.getElementById("doneStrength").textContent = efficacy.strength_prompt || "작은 근거 하나";
      document.getElementById("strengthNote").value = "";
      document.getElementById("seedSaved").style.display = "none";
      pickedSeed = null;
      document.getElementById("btnSaveSeed").disabled = true;
      const seeds = efficacy.seeds || [];
      const box = document.getElementById("seedBox");
      box.innerHTML = seeds.map((s) =>
        `<button type="button" class="pick seed" data-seed="${esc(s)}">${esc(s)}</button>`
      ).join("");
      box.querySelectorAll(".seed").forEach((b) => {
        b.onclick = () => {
          box.querySelectorAll(".seed").forEach((x) => x.classList.remove("picked"));
          b.classList.add("picked");
          pickedSeed = b.dataset.seed;
          document.getElementById("btnSaveSeed").disabled = !pickedSeed;
        };
      });
      const rail = (directing.rail || []).map((s) => ({
        ...s,
        state: s.id === "efficacy" ? "active" : "done",
      }));
      renderRail(document.getElementById("doneRail"), rail, "efficacy");
      document.getElementById("doneJson").textContent = JSON.stringify(
        { efficacy, agent_sync: data.agent_sync, score: data.formal_scores?.[current.instrument_id] },
        null,
        2
      );
      show("viewDone");
      loadAgent();
    }

    async function submit(skipped) {
      await ensureSession();
      const item = current.items[itemIdx];
      const finished = itemIdx >= current.items.length - 1;
      const res = await fetch("/api/v1/assessments/submit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user_id: userId,
          session_id: sessionId,
          instrument: current.instrument_id,
          item_id: item.item_id,
          value: skipped ? undefined : selected,
          skipped: !!skipped,
          item_index: itemIdx,
          finished,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        alert(typeof data.detail === "string" ? data.detail : "저장에 실패했어요");
        return;
      }
      if (data.directing) applyDirecting(data.directing, data.directing.layers?.progress?.pct);
      itemIdx += 1;
      if (itemIdx >= current.items.length) {
        showEfficacy(data);
        return;
      }
      renderItem();
    }

    async function saveSeed() {
      if (!pickedSeed) return;
      await ensureSession();
      const res = await fetch("/api/v1/assessments/efficacy-seed", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          user_id: userId,
          session_id: sessionId,
          instrument: current?.instrument_id || "unknown",
          seed: pickedSeed,
          strength_note: document.getElementById("strengthNote").value.trim() || undefined,
        }),
      });
      const data = await res.json();
      if (!res.ok) {
        alert(typeof data.detail === "string" ? data.detail : "저장 실패");
        return;
      }
      const el = document.getElementById("seedSaved");
      el.style.display = "block";
      el.textContent = data.message || "저장했어요.";
    }

    document.getElementById("btnBack").onclick = () => show("viewList");
    document.getElementById("btnAgain").onclick = () => show("viewList");
    document.getElementById("btnSkip").onclick = () => submit(true);
    document.getElementById("btnNext").onclick = () => submit(false);
    document.getElementById("btnSaveSeed").onclick = () => saveSeed();

    function renderGuided(guided) {
      const box = document.getElementById("guidedBox");
      if (!box || !guided) return;
      const starters = guided.starters || [];
      if (!starters.length) {
        box.innerHTML = `<p class="lead">${esc(guided.subheadline || "오늘은 하나만 골라도 돼요.")}</p>`;
        return;
      }
      box.innerHTML =
        `<div class="meta">${esc(guided.headline || "오늘 추천")}</div>` +
        `<p class="lead" style="margin:0 0 10px">${esc(guided.subheadline || "")}</p>` +
        starters.slice(0, 6).map((s) => `
          <button type="button" class="pick" data-gid="${esc(s.instrument_id)}" style="width:100%;margin-bottom:6px">
            <strong>${esc(s.user_title)}</strong>
            <span class="meta" style="display:block;margin:4px 0 0">${esc(s.domain_label || "")} · ${s.item_count || "?"}문항</span>
            <span class="lead" style="display:block;margin-top:4px">${esc(s.intro || s.why || "")}</span>
          </button>`).join("");
      box.querySelectorAll("[data-gid]").forEach((btn) => {
        btn.onclick = () => start(btn.dataset.gid);
      });
    }

    fetch("/api/v1/clinical/catalog")
      .then((r) => r.json())
      .then((data) => {
        catalog = (data.formal_instruments || []).filter((i) => i.instrument_id !== "micro_emotion");
        // starters may include micro_emotion — keep full map for start()
        const all = data.formal_instruments || [];
        all.forEach((i) => {
          if (!catalog.find((c) => c.instrument_id === i.instrument_id)) catalog.push(i);
        });
        catalog.sort((a, b) => (a.domain_label || "").localeCompare(b.domain_label || "", "ko"));
        renderGuided(data.guided);
        renderDomainBar();
        renderList();
      })
      .catch(() => {
        document.getElementById("list").innerHTML = "<p class='lead'>카탈로그 로드 실패</p>";
      });
    loadAgent();
  </script>
</body>
</html>
