<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#3182F6" />
  <meta name="description" content="AI 마음 웰니스 · 자기성찰 — 마음쉼터 (비의료)" />
  <link rel="manifest" href="/static/manifest.json" />
  <link rel="apple-touch-icon" href="/static/icons/icon.svg" />
  <title>마음쉼터</title>
  <link rel="stylesheet" href="/static/css/toss-ui.css" />
  <style>
    :root {
      --app-header-h: 52px;
      --app-tabs-h: 48px;
      --app-footer-h: 56px;
    }
    html, body { height: 100%; margin: 0; }
    body.app-shell {
      display: grid;
      grid-template-rows: var(--app-header-h) var(--app-tabs-h) 1fr auto;
      max-width: 960px;
      margin: 0 auto;
      background: var(--t-bg, #f2f4f6);
      font-family: system-ui, -apple-system, sans-serif;
    }
    .app-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; background: #fff; border-bottom: 1px solid #e5e8eb;
      position: sticky; top: 0; z-index: 10;
    }
    .app-header h1 { margin: 0; font-size: 1.05rem; font-weight: 800; letter-spacing: -0.03em; }
    .scope-badge {
      font-size: 0.62rem; font-weight: 700; padding: 4px 8px; border-radius: 999px;
      background: #eef3ff; color: #1a56db;
    }
    .app-tabs {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 0;
      background: #fff; border-bottom: 1px solid #e5e8eb;
    }
    .app-tabs button {
      border: none; background: transparent; padding: 12px 8px;
      font: inherit; font-size: 0.82rem; font-weight: 600; color: #8b95a1; cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .app-tabs button.active { color: #3182f6; border-bottom-color: #3182f6; }
    .app-main { min-height: 0; position: relative; background: #fff; }
    .app-frame {
      position: absolute; inset: 0; width: 100%; height: 100%; border: none;
      display: none; background: #fff;
    }
    .app-frame.active { display: block; }
    .app-footer {
      padding: 8px 12px 12px; font-size: 0.65rem; color: #6b7684; line-height: 1.5;
      background: #fff; border-top: 1px solid #e5e8eb; text-align: center;
    }
    .app-footer a { color: #3182f6; text-decoration: none; margin: 0 4px; }
    .crisis-line { font-weight: 700; color: #d14343; margin-bottom: 4px; }
    .consent-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 1000;
      display: grid; place-items: center; padding: 16px;
    }
    .consent-overlay[hidden] { display: none; }
    .consent-card {
      max-width: 420px; width: 100%; background: #fff; border-radius: 16px;
      padding: 20px; box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .consent-card h2 { margin: 0 0 8px; font-size: 1.05rem; }
    .consent-card p { margin: 0 0 10px; font-size: 0.82rem; color: #4e5968; line-height: 1.55; }
    .consent-card ul { margin: 0 0 14px; padding-left: 18px; font-size: 0.78rem; color: #4e5968; line-height: 1.5; }
    .consent-actions { display: flex; gap: 8px; }
    .consent-actions button {
      flex: 1; border: none; border-radius: 10px; padding: 12px; font: inherit;
      font-weight: 700; cursor: pointer;
    }
    .consent-actions .primary { background: #3182f6; color: #fff; }
    .consent-actions .secondary { background: #f2f4f6; color: #4e5968; }
  </style>
</head>
<body class="app-shell toss-ui">
  <div class="consent-overlay" id="consentOverlay" hidden>
    <div class="consent-card" role="dialog" aria-labelledby="consentTitle">
      <h2 id="consentTitle">서비스 이용 안내</h2>
      <p id="consentSummary">불러오는 중…</p>
      <ul id="consentList"></ul>
      <div class="consent-actions">
        <button type="button" class="secondary" id="consentDetail">자세히 보기</button>
        <button type="button" class="primary" id="consentAccept">이해했어요 · 시작</button>
      </div>
    </div>
  </div>

  <header class="app-header">
    <h1>마음쉼터</h1>
    <span class="scope-badge">AI 웰니스 · 비의료</span>
  </header>

  <nav class="app-tabs" aria-label="앱 메뉴">
    <button type="button" data-tab="tarot" class="active" id="tabTarot">타로</button>
    <button type="button" data-tab="checkin" id="tabCheckin">오늘 마음</button>
    <button type="button" data-tab="chat" id="tabChat">AI 대화</button>
  </nav>

  <main class="app-main">
    <iframe class="app-frame active" id="frameTarot" title="타로 자기성찰" src="/tarot?embed=1"></iframe>
    <iframe class="app-frame" id="frameCheckin" title="오늘 마음 체크인" src="/home?embed=1"></iframe>
    <iframe class="app-frame" id="frameChat" title="AI 마음 대화" src="/chat?embed=1"></iframe>
  </main>

  <footer class="app-footer">
    <div class="crisis-line">위기 시 1393 · 119 · 129 · 1577-0199</div>
    <div>
      AI 웰니스·자기성찰 도구 (의료·정신과 진료·응급 아님) ·
      <a href="/legal#terms">이용약관</a>
      <a href="/legal#privacy">개인정보</a>
      <a href="/legal#disclaimer">면책</a>
    </div>
  </footer>

  <script>
    const CONSENT_KEY = "psychology_ai_consent_v1";
    const DEFAULT_TAB = "tarot";
    const frames = {
      tarot: document.getElementById("frameTarot"),
      checkin: document.getElementById("frameCheckin"),
      chat: document.getElementById("frameChat"),
    };
    const tabs = document.querySelectorAll(".app-tabs button");

    function switchTab(name) {
      tabs.forEach((btn) => btn.classList.toggle("active", btn.dataset.tab === name));
      Object.entries(frames).forEach(([key, frame]) => {
        frame.classList.toggle("active", key === name);
      });
      location.hash = name;
    }

    tabs.forEach((btn) => btn.addEventListener("click", () => switchTab(btn.dataset.tab)));

    const hash = (location.hash || `#${DEFAULT_TAB}`).replace("#", "");
    if (frames[hash]) switchTab(hash);
    else switchTab(DEFAULT_TAB);

    async function loadConsent() {
      if (localStorage.getItem(CONSENT_KEY) === "1") return;
      const overlay = document.getElementById("consentOverlay");
      try {
        const res = await fetch("/api/v1/legal/consent");
        const data = await res.json();
        document.getElementById("consentSummary").textContent = data.summary || "";
        document.getElementById("consentList").innerHTML = (data.acknowledgments || [])
          .map((item) => `<li>${item}</li>`).join("");
      } catch (_) {
        document.getElementById("consentSummary").textContent =
          "마음쉼터는 AI 웰니스·자기성찰 도구이며, 의료·정신과 진료·응급 서비스가 아닙니다.";
      }
      overlay.hidden = false;
    }

    document.getElementById("consentAccept").addEventListener("click", () => {
      localStorage.setItem(CONSENT_KEY, "1");
      document.getElementById("consentOverlay").hidden = true;
    });
    document.getElementById("consentDetail").addEventListener("click", () => {
      window.open("/legal", "_blank");
    });

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/static/sw.js").catch(() => {});
    }
    loadConsent();
    window.addEventListener("message", (event) => {
      const tab = event.data?.tab;
      if (event.data?.type !== "maum-nav" || !frames[tab]) return;
      switchTab(tab);
      if (tab === "chat" && event.data.from_tarot) {
        frames.chat.contentWindow?.postMessage({ type: "maum-tarot-handoff" }, "*");
      }
    });
  </script>
</body>
</html>
