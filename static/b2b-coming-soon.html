<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>마음쉼터 · 기관용은 별도 준비</title>

  <style>
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      font-family: "IBM Plex Sans KR", sans-serif; color: #eef2f6;
      background: radial-gradient(ellipse 50% 40% at 50% 0%, rgba(126,168,142,0.18), transparent 60%), #141816;
      padding: 24px; text-align: center;
    }
    h1 { font-family: "Fraunces", serif; font-size: 1.6rem; margin: 0 0 12px; }
    p { color: rgba(238,242,246,0.7); max-width: 420px; line-height: 1.6; margin: 0 auto 18px; }
    a {
      display: inline-block; padding: 12px 18px; border-radius: 10px; text-decoration: none;
      background: #5a8f78; color: #fff; font-weight: 600;
    }
  </style>
</head>
<body>
  <div>
    <h1>기관용 기능은 따로 만들 예정이에요</h1>
    <p>
      지금 이 앱은 개인 유저용입니다. 학회 라이선스·구독·케이스 노트(수련용)는
      유저 앱과 분리해 별도 제품으로 준비합니다.
    </p>
    <a href="/home">유저 홈으로 돌아가기</a>
  </div>

</html>
