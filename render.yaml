# Render.com Blueprint — https://render.com/docs/blueprint-spec
# One-click deploy: https://render.com/deploy?repo=https://github.com/jayhope9907/psychology-tarot-ai
services:
  - type: web
    name: psychology-tarot-ai
    runtime: docker
    repo: https://github.com/jayhope9907/psychology-tarot-ai
    branch: main
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: FERNET_KEY
        generateValue: true
      - key: PURGE_AUDIT_TOKEN
        generateValue: true
      - key: PORT
        value: "8000"
